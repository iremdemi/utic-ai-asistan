<style>
  :root {
    --navy-950: #0c1830;
    --navy-900: #122142;
    --navy-800: #1a2d54;
    --navy-700: #24396b;
    --gold-500: #c39a4d;
    --gold-400: #d4b06c;
    --paper: #f7f4ee;
    --paper-card: #ffffff;
    --ink: #1c2333;
    --ink-soft: #5a6172;
    --border: #e4dfd2;
    --danger: #a3402f;
    --radius: 14px;
    --shadow: 0 8px 30px rgba(12, 24, 48, 0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--paper);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 640px;
    height: min(820px, calc(100vh - 48px));
    background: var(--paper-card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .header {
    background: linear-gradient(160deg, var(--navy-950), var(--navy-800));
    color: #fff;
    padding: 22px 24px 20px;
    position: relative;
    flex-shrink: 0;
  }

  .header::after {
    content: "";
    position: absolute;
    left: 24px;
    right: 24px;
    bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-500), transparent 75%);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--gold-500);
    color: var(--navy-950);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 17px;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 20px;
    margin: 0;
    letter-spacing: 0.2px;
  }

  .header p {
    margin: 2px 0 0;
    font-size: 12.5px;
    color: rgba(255,255,255,0.62);
    letter-spacing: 0.3px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      radial-gradient(circle at top right, rgba(195,154,77,0.05), transparent 40%),
      var(--paper);
  }

  .msg {
    max-width: 84%;
    line-height: 1.5;
    font-size: 14.5px;
    animation: rise 0.25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
