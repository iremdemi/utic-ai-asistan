<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UTİC AI Asistanı — Sakarya Üniversitesi</title>
<meta name="description" content="Sakarya Üniversitesi Uluslararası Ticaret ve Lojistik Bölümü öğrencileri için yapay zeka destekli bilgi asistanı." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-950: #0c1830;
    --navy-900: #122142;
    --navy-800: #1a2d54;
    --navy-700: #24396b;
    --gold-500: #c39a4d;
    --gold-400: #d4b06c;
    --paper: #f7f4ee;
    --paper-card: #ffffff;
    --ink: #1c2333;
    --ink-soft: #5a6172;
    --border: #e4dfd2;
    --danger: #a3402f;
    --radius: 14px;
    --shadow: 0 8px 30px rgba(12, 24, 48, 0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--paper);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 640px;
    height: min(820px, calc(100vh - 48px));
    background: var(--paper-card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* ---------- Header ---------- */
  .header {
    background: linear-gradient(160deg, var(--navy-950), var(--navy-800));
    color: #fff;
    padding: 22px 24px 20px;
    position: relative;
    flex-shrink: 0;
  }

  .header::after {
    content: "";
    position: absolute;
    left: 24px;
    right: 24px;
    bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-500), transparent 75%);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--gold-500);
    color: var(--navy-950);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 17px;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 20px;
    margin: 0;
    letter-spacing: 0.2px;
  }

  .header p {
    margin: 2px 0 0;
    font-size: 12.5px;
    color: rgba(255,255,255,0.62);
    letter-spacing: 0.3px;
  }

  /* ---------- Messages ---------- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      radial-gradient(circle at top right, rgba(195,154,77,0.05), transparent 40%),
      var(--paper);
  }

  .msg {
    max-width: 84%;
    line-height: 1.5;
    font-size: 14.5px;
    animation: rise 0.25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--navy-900);
    color: #fff;
    padding: 11px 15px;
    border-radius: 16px 16px 4px 16px;
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--paper-card);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 4px 16px 16px 16px;
  }

  .msg.bot strong { color: var(--navy-900); }
  .msg.bot ul { margin: 6px 0; padding-left: 18px; }
  .msg.bot li { margin: 3px 0; }

  .msg.error {
    align-self: flex-start;
    background: #fbeceb;
    border: 1px solid #ecc7c1;
    color: var(--danger);
    padding: 11px 15px;
    border-radius: 4px 16px 16px 16px;
    font-size: 13.5px;
  }

  .welcome {
    align-self: stretch;
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .welcome strong { color: var(--ink); }

  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
    max-height: 260px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    text-align: left;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    padding: 13px 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.15s ease;
  }

  .menu-item .icon { font-size: 16px; margin-left: 10px; flex-shrink: 0; }

  .menu-item:hover {
    background: var(--navy-900);
    color: #fff;
    border-color: var(--navy-900);
  }

  .menu-item.back {
    background: var(--navy-900);
    color: #fff;
    border-color: var(--navy-900);
    justify-content: center;
    font-weight: 600;
    margin-top: 4px;
  }

  .menu-item.back:hover { background: var(--navy-800); }

  .submenu-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    margin: 0 0 2px;
    font-weight: 600;
  }

  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold-500);
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- Input ---------- */
  .input-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--paper-card);
  }

  .input-row textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.4;
    max-height: 100px;
    outline: none;
    background: var(--paper);
    color: var(--ink);
  }

  .input-row textarea:focus {
    border-color: var(--gold-500);
    background: #fff;
  }

  .send-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: var(--navy-900);
    color: var(--gold-400);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.15s ease;
  }

  .send-btn:hover:not(:disabled) { background: var(--navy-800); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    padding: 8px 16px 14px;
    background: var(--paper-card);
  }

  @media (max-width: 480px) {
    body { padding: 0; }
    .app { max-width: 100%; height: 100vh; border-radius: 0; border: none; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="mark">U</div>
      <div>
        <h1>UTİC AI Asistanı</h1>
        <p>Uluslararası Ticaret ve Lojistik &middot; Sakarya Üniversitesi</p>
      </div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Sorunu yaz..." aria-label="Mesajınızı yazın"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Gönder">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="footer-note">UTİC bölüm belgeleri ile eğitilmiştir · Bilgiler yanlış olabilir, resmi işlemler için bölüm sekreterliğini teyit edin.</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  let history = []; // {role: 'user'|'assistant', text: string}
  let isLoading = false;

  const ENDPOINT = '/.netlify/functions/chat';

  // ---------- Konu / alt-konu menü verisi ----------
  const TOPICS = [
    {
      icon: '🏛️', label: 'Bölümümüz Hakkında',
      query: 'UTİC bölümü hakkında genel bilgi verir misin?',
      submenu: [
        { label: 'Bölümün tarihçesi nedir?', query: 'UTİC bölümünün tarihçesi nedir, ne zaman kuruldu?' },
        { label: 'Misyon ve vizyonumuz nedir?', query: 'UTİC bölümünün misyonu ve vizyonu nedir?' },
        { label: 'Mezunlar nerede çalışabilir?', query: 'UTİC mezunları hangi sektörlerde ve pozisyonlarda çalışabilir?' },
      ],
    },
    {
      icon: '📋', label: '7+1 Staj Süreci',
      query: '7+1 staj süreci nasıl işliyor?',
      submenu: [
        { label: 'Zorunlu staj (İME) şartları neler?', query: 'Zorunlu stajım (İME) için GNO şartı ve başvuru süreci nedir?' },
        { label: 'İşyeri hangi şartları taşımalı?', query: 'Staj yapacağım işyeri hangi şartları taşımalı?' },
        { label: 'Devamsızlık kuralı nedir?', query: 'Stajda devamsızlık ve DZ notu kuralı nedir?' },
        { label: 'İsteğe bağlı yaz stajı nasıl olur?', query: 'İsteğe bağlı yaz stajı başvurusu nasıl yapılır?' },
      ],
    },
    {
      icon: '✈️', label: 'Erasmus & Farabi',
      query: 'Erasmus ve Farabi başvurusu nasıl yapılır?',
      submenu: [
        { label: 'Erasmus başvuru adımları neler?', query: 'Erasmus başvurusunun adımları neler?' },
        { label: 'Farabi programı nedir?', query: 'Farabi programı nedir, nasıl başvurulur?' },
        { label: 'Alınan dersler nasıl tanınıyor?', query: 'Erasmus\'ta alınan derslerin intibakı/tanınması nasıl oluyor?' },
      ],
    },
    {
      icon: '🎓', label: 'ÇAP & Yandal',
      query: 'ÇAP için hangi bölümlere ve hangi şartlarla başvurabilirim?',
      submenu: [
        { label: 'Hangi bölümlerde ÇAP yapılabilir?', query: 'UTİC öğrencileri hangi bölümlerde ÇAP yapabilir?' },
        { label: 'ÇAP başvuru şartları neler?', query: 'ÇAP başvurusu için hangi şartlar aranıyor?' },
        { label: 'ÇAP mi Yandal mı, farkı ne?', query: 'ÇAP ile Yandal arasındaki fark nedir?' },
      ],
    },
    {
      icon: '📝', label: 'Sınav & Not Geçme',
      query: 'Sınavlardan geçme notu kaç ve nasıl hesaplanıyor?',
      submenu: [
        { label: 'Bütünlemeye kimler giremez?', query: 'Bütünleme sınavına kimler giremez?' },
        { label: 'Çakışma kuralı nasıl işliyor?', query: 'Ders tekrarında çakışma kuralı ve istisnaları nedir?' },
        { label: 'Notlar nasıl hesaplanıyor?', query: 'Ders notları nasıl hesaplanıyor?' },
      ],
    },
    {
      icon: '👩‍🏫', label: 'Akademik Kadro',
      query: 'Bölüm başkanı ve öğretim üyeleri kimler, nasıl ulaşabilirim?',
      submenu: [
        { label: 'Bölüm başkanı kim?', query: 'UTİC bölüm başkanı kim ve iletişim bilgisi nedir?' },
        { label: 'Danışmanlık nasıl işliyor?', query: 'Akademik danışmanlık sistemi nasıl işliyor, istisnalar var mı?' },
        { label: 'Öğretim üyeleri kimler?', query: 'UTİC bölümündeki öğretim üyeleri kimler?' },
      ],
    },
    {
      icon: '📣', label: 'Kulüpler & İletişim',
      query: 'Bölümle ilgili kulüpler ve iletişim bilgileri neler?',
      submenu: [
        { label: 'Sosyal medya hesaplarımız neler?', query: 'Bölümün sosyal medya hesapları neler?' },
        { label: 'Hangi öğrenci toplulukları var?', query: 'UTİC ile ilgili hangi öğrenci toplulukları/kulüpleri var?' },
      ],
    },
    {
      icon: '🗂️', label: 'Komisyonlar',
      query: 'Bölüm komisyonları ve üyeleri kimler?',
      submenu: [
        { label: 'Burs komisyonunda kimler var?', query: 'Burs komisyonunda kimler görev yapıyor?' },
        { label: 'Erasmus komisyonu kim?', query: 'Erasmus komisyonunda kimler görev yapıyor?' },
        { label: 'Akreditasyon komisyonu kim?', query: 'Akreditasyon komisyonunda kimler görev yapıyor?' },
      ],
    },
  ];

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatText(text) {
    let escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    const lines = escaped.split('\n');
    let html = '';
    let inList = false;
    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + trimmed.slice(2) + '</li>';
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        if (trimmed) html += '<p style="margin:6px 0">' + trimmed + '</p>';
      }
    }
    if (inList) html += '</ul>';
    return html || escaped;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    if (role === 'user') {
      div.textContent = text;
    } else {
      div.innerHTML = formatText(text);
    }
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addError(text) {
    const div = document.createElement('div');
    div.className = 'msg error';
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  // ---------- Ana menü / alt menü bloğu oluştur ----------
  function createMenuBlock(topic) {
    const wrap = document.createElement('div');
    wrap.className = 'welcome';

    if (!topic) {
      wrap.innerHTML = '<strong>Merhaba! 👋</strong> Ben UTİC AI Asistanı — bölümün staj, ' +
        'Erasmus, ÇAP, sınav ve daha bir sürü konudaki resmi belgeleriyle eğitildim, yani ' +
        'sana kafamdan atmadan, gerçek bölüm bilgileriyle cevap veriyorum 😊<br>Aşağıdan bir ' +
        'konu seçebilir ya da direkt sorunu yazabilirsin, hangisi rahatsa!';
    } else {
      const title = document.createElement('p');
      title.className = 'submenu-title';
      title.textContent = topic.label + ' ile ilgili daha fazlası';
      wrap.appendChild(title);
    }

    const list = document.createElement('div');
    list.className = 'menu-list';

    const items = topic ? topic.submenu : TOPICS;
    items.forEach((item) => {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.innerHTML = topic ? item.label : (item.label + ' <span class="icon">' + item.icon + '</span>');
      btn.addEventListener('click', () => {
        const targetTopic = topic || item;
        askTopic(targetTopic, item.query);
      });
      list.appendChild(btn);
    });

    if (topic) {
      const backBtn = document.createElement('button');
      backBtn.className = 'menu-item back';
      backBtn.textContent = '🔙 Ana Menüye Dön';
      backBtn.addEventListener('click', () => {
        messagesEl.appendChild(createMenuBlock(null));
        scrollToBottom();
      });
      list.appendChild(backBtn);
    }

    wrap.appendChild(list);
    return wrap;
  }

  function askTopic(topic, query) {
    sendMessage(query, topic);
  }

  async function sendMessage(text, topic) {
    if (!text || !text.trim() || isLoading) return;

    addMessage('user', text);
    history.push({ role: 'user', text });
    inputEl.value = '';
    inputEl.style.height = 'auto';

    isLoading = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) })
      });

      const data = await res.json();
      hideTyping();

      if (!res.ok) {
        addError(data.error || 'Bir hata oluştu, lütfen tekrar dene.');
      } else {
        addMessage('bot', data.reply);
        history.push({ role: 'assistant', text: data.reply });
      }
    } catch (err) {
      hideTyping();
      addError('Bağlantı hatası: sunucuya ulaşılamadı. İnternetini kontrol edip tekrar dener misin?');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
      if (topic) {
        messagesEl.appendChild(createMenuBlock(topic));
        scrollToBottom();
      }
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(inputEl.value);
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  // İlk yüklemede ana menüyü göster
  messagesEl.appendChild(createMenuBlock(null));
</script>

</body>
</html>
