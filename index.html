<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UTİC AI Asistanı</title>
<meta name="description" content="Sakarya Üniversitesi Uluslararası Ticaret ve Lojistik Bölümü öğrencileri için yapay zeka destekli bilgi asistanı." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-950: #0a1528;
    --navy-900: #0f1e3d;
    --navy-800: #17294f;
    --navy-700: #223862;
    --gold-500: #c39a4d;
    --gold-400: #d9b877;
    --copper-500: #9c6b3e;
    --paper: #f6f4ef;
    --card: rgba(255, 255, 255, 0.86);
    --ink: #16213a;
    --ink-soft: #5c6478;
    --border: rgba(15, 30, 61, 0.10);
    --danger: #a3402f;
    --radius: 16px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--paper);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* ---------- Gemini tarzi animasyonlu aurora arka plan (UTIC paletiyle) ---------- */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .aurora span {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.55;
    animation: drift 24s ease-in-out infinite;
  }

  .aurora span:nth-child(1) {
    width: 460px; height: 460px;
    background: var(--navy-700);
    top: -140px; left: -120px;
  }
  .aurora span:nth-child(2) {
    width: 420px; height: 420px;
    background: var(--gold-500);
    top: 10%; right: -160px;
    animation-delay: -7s;
  }
  .aurora span:nth-child(3) {
    width: 380px; height: 380px;
    background: var(--copper-500);
    bottom: -160px; left: 18%;
    animation-delay: -14s;
  }
  .aurora span:nth-child(4) {
    width: 340px; height: 340px;
    background: var(--navy-800);
    bottom: 5%; right: 8%;
    animation-delay: -20s;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, -35px) scale(1.12); }
    66% { transform: translate(-35px, 30px) scale(0.92); }
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    height: min(820px, calc(100vh - 48px));
    background: var(--card);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(10, 21, 40, 0.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.4);
  }

  /* ---------- Header ---------- */
  .header {
    background: linear-gradient(150deg, var(--navy-950), var(--navy-800));
    padding: 20px 22px;
    position: relative;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header::after {
    content: "";
    position: absolute;
    left: 22px; right: 22px; bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-500), transparent 75%);
  }

  .header img.logo {
    height: 40px;
    width: auto;
    flex-shrink: 0;
  }

  .header .titles h1 {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: #fff;
    margin: 0;
    letter-spacing: 0.2px;
  }

  .header .titles p {
    margin: 3px 0 0;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
  }

  /* ---------- Messages ---------- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 84%;
    line-height: 1.55;
    font-size: 14.5px;
    animation: rise 0.25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--navy-900);
    color: #fff;
    padding: 11px 15px;
    border-radius: 16px 16px 4px 16px;
  }

  .msg.bot {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 4px 16px 16px 16px;
  }

  .msg.bot strong { color: var(--navy-900); }
  .msg.bot ul { margin: 6px 0; padding-left: 18px; }
  .msg.bot li { margin: 3px 0; }

  .msg.error {
    align-self: flex-start;
    background: #fbeceb;
    border: 1px solid #ecc7c1;
    color: var(--danger);
    padding: 11px 15px;
    border-radius: 4px 16px 16px 16px;
    font-size: 13.5px;
  }

  .welcome {
    align-self: stretch;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.6;
  }

  .welcome p { margin: 0 0 10px; }
  .welcome p:last-of-type { margin-bottom: 0; }

  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
    max-height: 260px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    text-align: left;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.6);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    padding: 13px 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.15s ease;
  }

  .menu-item .icon { font-size: 16px; margin-left: 10px; flex-shrink: 0; }

  .menu-item:hover {
    background: var(--navy-900);
    color: #fff;
    border-color: var(--navy-900);
  }

  .menu-item.back {
    background: var(--navy-900);
    color: #fff;
    border-color: var(--navy-900);
    justify-content: center;
    font-weight: 600;
    margin-top: 4px;
  }

  .menu-item.back:hover { background: var(--navy-800); }

  .submenu-title {
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    margin: 0 0 2px;
    font-weight: 600;
  }

  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold-500);
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- Input ---------- */
  .input-row {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.7);
  }

  .input-row textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.4;
    max-height: 100px;
    outline: none;
    background: #fff;
    color: var(--ink);
  }

  .input-row textarea:focus {
    border-color: var(--gold-500);
  }

  .send-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: var(--navy-900);
    color: var(--gold-400);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.15s ease;
  }

  .send-btn:hover:not(:disabled) { background: var(--navy-800); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    padding: 8px 16px 14px;
    background: rgba(255, 255, 255, 0.7);
  }

  @media (max-width: 480px) {
    body { padding: 0; }
    .app { max-width: 100%; height: 100vh; border-radius: 0; border: none; }
  }
</style>
</head>
<body>

<div class="aurora">
  <span></span><span></span><span></span><span></span>
</div>

<div class="app">
  <div class="header">
    <img class="logo" src="assets/utic-logo.png" alt="UTİC" />
    <div class="titles">
      <h1>AI Asistanı</h1>
      <p>Uluslararası Ticaret ve Lojistik, Sakarya Üniversitesi</p>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Sorunu yaz..." aria-label="Mesajınızı yazın"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Gönder">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="footer-note">İrem Demir tarafından UTİC Bölümü için geliştirilmiştir.</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  let history = [];
  let isLoading = false;

  const ENDPOINT = '/.netlify/functions/chat';

  const WELCOME_HTML =
    '<p><strong>Merhaba! 👋</strong> Ben UTİC AI Asistanı. Burada olduğuna sevindim! 😊</p>' +
    '<p>Bölümle ilgili aklına takılan sorularda sana destek olmak için tasarlandım. Staj, Erasmus, ÇAP, Yandal, dersler, sınavlar, mezuniyet ve diğer akademik süreçlerle ilgili sorularını resmi bilgi ve yönergeleri esas alarak yanıtlıyorum.</p>' +
    '<p>İster kısa bir bilgi almak iste, ister detaylı bir konuda yardım arıyor ol, sana en doğru ve anlaşılır şekilde yardımcı olmaya çalışacağım.</p>' +
    '<p>💬 Hemen başlayabilirsin! Aşağıdan bir konu seçebilir veya sorunu doğrudan yazabilirsin.</p>';

  // ---------- Konu / alt-konu menu verisi ----------
  const TOPICS = [
    {
      icon: '🏛️', label: 'Bölümümüz Hakkında',
      query: 'UTİC bölümü hakkında genel bilgi verir misin?',
      submenu: [
        { label: 'Bölümün tarihçesi nedir?', query: 'UTİC bölümünün tarihçesi nedir, ne zaman kuruldu?' },
        { label: 'Misyon ve vizyonumuz nedir?', query: 'UTİC bölümünün misyonu ve vizyonu nedir?' },
        { label: 'Mezunlar nerede çalışabilir?', query: 'UTİC mezunları hangi sektörlerde ve pozisyonlarda çalışabilir?' },
      ],
    },
    {
      icon: '📋', label: '7+1 Staj Süreci',
      query: '7+1 staj süreci nasıl işliyor?',
      submenu: [
        { label: 'Zorunlu staj (İME) şartları neler?', query: 'Zorunlu stajım (İME) için GNO şartı ve başvuru süreci nedir?' },
        { label: 'İşyeri hangi şartları taşımalı?', query: 'Staj yapacağım işyeri hangi şartları taşımalı?' },
        { label: 'Devamsızlık kuralı nedir?', query: 'Stajda devamsızlık ve DZ notu kuralı nedir?' },
        { label: 'İsteğe bağlı yaz stajı nasıl olur?', query: 'İsteğe bağlı yaz stajı başvurusu nasıl yapılır?' },
      ],
    },
    {
      icon: '✈️', label: 'Erasmus & Farabi',
      query: 'Erasmus ve Farabi başvurusu nasıl yapılır?',
      submenu: [
        { label: 'Erasmus başvuru adımları neler?', query: 'Erasmus başvurusunun adımları neler?' },
        { label: 'Farabi programı nedir?', query: 'Farabi programı nedir, nasıl başvurulur?' },
        { label: 'Alınan dersler nasıl tanınıyor?', query: 'Erasmus\'ta alınan derslerin intibakı/tanınması nasıl oluyor?' },
      ],
    },
    {
      icon: '🎓', label: 'ÇAP & Yandal',
      query: 'ÇAP için hangi bölümlere ve hangi şartlarla başvurabilirim?',
      submenu: [
        { label: 'Hangi bölümlerde ÇAP yapılabilir?', query: 'UTİC öğrencileri hangi bölümlerde ÇAP yapabilir?' },
        { label: 'ÇAP başvuru şartları neler?', query: 'ÇAP başvurusu için hangi şartlar aranıyor?' },
        { label: 'ÇAP mi Yandal mı, farkı ne?', query: 'ÇAP ile Yandal arasındaki fark nedir?' },
      ],
    },
    {
      icon: '📝', label: 'Sınav & Not Geçme',
      query: 'Sınavlardan geçme notu kaç ve nasıl hesaplanıyor?',
      submenu: [
        { label: 'Bütünlemeye kimler giremez?', query: 'Bütünleme sınavına kimler giremez?' },
        { label: 'Çakışma kuralı nasıl işliyor?', query: 'Ders tekrarında çakışma kuralı ve istisnaları nedir?' },
        { label: 'Notlar nasıl hesaplanıyor?', query: 'Ders notları nasıl hesaplanıyor?' },
      ],
    },
    {
      icon: '👩‍🏫', label: 'Akademik Kadro',
      query: 'Bölüm başkanı ve öğretim üyeleri kimler, nasıl ulaşabilirim?',
      submenu: [
        { label: 'Bölüm başkanı kim?', query: 'UTİC bölüm başkanı kim ve iletişim bilgisi nedir?' },
        { label: 'Danışmanlık nasıl işliyor?', query: 'Akademik danışmanlık sistemi nasıl işliyor, istisnalar var mı?' },
        { label: 'Öğretim üyeleri kimler?', query: 'UTİC bölümündeki öğretim üyeleri kimler?' },
      ],
    },
    {
      icon: '📣', label: 'Kulüpler & İletişim',
      query: 'Bölümle ilgili kulüpler ve iletişim bilgileri neler?',
      submenu: [
        { label: 'Sosyal medya hesaplarımız neler?', query: 'Bölümün sosyal medya hesapları neler?' },
        { label: 'Hangi öğrenci toplulukları var?', query: 'UTİC ile ilgili hangi öğrenci toplulukları/kulüpleri var?' },
      ],
    },
    {
      icon: '🗂️', label: 'Komisyonlar',
      query: 'Bölüm komisyonları ve üyeleri kimler?',
      submenu: [
        { label: 'Burs komisyonunda kimler var?', query: 'Burs komisyonunda kimler görev yapıyor?' },
        { label: 'Erasmus komisyonu kim?', query: 'Erasmus komisyonunda kimler görev yapıyor?' },
        { label: 'Akreditasyon komisyonu kim?', query: 'Akreditasyon komisyonunda kimler görev yapıyor?' },
      ],
    },
    {
      icon: '💼', label: '21 Gün 37 Derece İş Topluluğu',
      query: '21 Gün 37 Derece İş Topluluğu hakkında bilgi verir misin?',
      submenu: [],
    },
  ];

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatText(text) {
    let escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    const lines = escaped.split('\n');
    let html = '';
    let inList = false;
    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + trimmed.slice(2) + '</li>';
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        if (trimmed) html += '<p style="margin:6px 0">' + trimmed + '</p>';
      }
    }
    if (inList) html += '</ul>';
    return html || escaped;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    if (role === 'user') {
      div.textContent = text;
    } else {
      div.innerHTML = formatText(text);
    }
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addError(text) {
    const div = document.createElement('div');
    div.className = 'msg error';
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  // ---------- Ana menu / alt menu blogu olustur ----------
  function createMenuBlock(topic) {
    const wrap = document.createElement('div');
    wrap.className = 'welcome';

    if (!topic) {
      wrap.innerHTML = WELCOME_HTML;
    } else {
      const title = document.createElement('p');
      title.className = 'submenu-title';
      title.textContent = topic.label + ' ile ilgili daha fazlasi';
      wrap.appendChild(title);
    }

    const list = document.createElement('div');
    list.className = 'menu-list';

    const items = topic ? topic.submenu : TOPICS;
    items.forEach((item) => {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.innerHTML = topic ? item.label : (item.label + ' <span class="icon">' + item.icon + '</span>');
      btn.addEventListener('click', () => {
        const targetTopic = topic || item;
        askTopic(targetTopic, item.query);
      });
      list.appendChild(btn);
    });

    if (topic) {
      const backBtn = document.createElement('button');
      backBtn.className = 'menu-item back';
      backBtn.textContent = 'Ana Menüye Dön';
      backBtn.addEventListener('click', () => {
        messagesEl.appendChild(createMenuBlock(null));
        scrollToBottom();
      });
      list.appendChild(backBtn);
    }

    wrap.appendChild(list);
    return wrap;
  }

  function askTopic(topic, query) {
    sendMessage(query, topic);
  }

  async function sendMessage(text, topic) {
    if (!text || !text.trim() || isLoading) return;

    addMessage('user', text);
    history.push({ role: 'user', text });
    inputEl.value = '';
    inputEl.style.height = 'auto';

    isLoading = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) })
      });

      const data = await res.json();
      hideTyping();

      if (!res.ok) {
        addError(data.error || 'Bir hata oluştu, lütfen tekrar dene.');
      } else {
        addMessage('bot', data.reply);
        history.push({ role: 'assistant', text: data.reply });
      }
    } catch (err) {
      hideTyping();
      addError('Bağlantı hatası, sunucuya ulaşılamadı. İnternetini kontrol edip tekrar dener misin?');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
      if (topic) {
        messagesEl.appendChild(createMenuBlock(topic));
        scrollToBottom();
      }
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(inputEl.value);
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  messagesEl.appendChild(createMenuBlock(null));
</script>

</body>
</html>
